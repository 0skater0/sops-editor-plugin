name: Feature request
description: Suggest an enhancement or new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: What problem does this solve?
      description: "Tell us about the workflow you're stuck on, not the solution you have in mind"
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: "How would this work from the user's point of view? Sketches, mockups and example flows are welcome"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: "Other approaches, existing workarounds, or prior art in similar plugins"
  - type: textarea
    id: additional
    attributes:
      label: Additional context
